<div class="container">
  <h2>Photos for Album #{{ albumId }}</h2>
  <div *ngIf="photos.length === 0">Loading photos...</div>
  <div class="grid" *ngIf="photos.length > 1">
    <div class="photo-card" *ngFor="let photo of photos">
      <img [src]="photo.thumbnailUrl" [alt]="photo.title">
      <p>{{ photo.title }}</p>
    </div>
  </div>
  <button (click)="goBack()" class="backbtn">Back</button>
</div>
